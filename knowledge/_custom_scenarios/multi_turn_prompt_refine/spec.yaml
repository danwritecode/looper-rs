name: multi-turn-prompt-refine
description: >-
  Optimize a system prompt for a multi-turn agent. The agent should maintain
  state across turns, ask clarifying questions before acting, stay consistent
  when user goals shift, enforce safety boundaries, and return actionable
  structured responses.
task_prompt: >-
  You are optimizing a system prompt for a multi-turn support agent.

  Target task:
  - Handle up to 6 turns per conversation.
  - Track user intent and constraints across turns.
  - Ask clarifying questions before proposing irreversible actions.
  - Detect goal shifts and restate the updated plan.
  - Refuse policy-violating requests and offer safe alternatives.

  Your output must be a single system prompt that includes explicit sections:
  Role, Turn Policy, Memory/State Tracking, Clarification Rules, Safety
  Rules, and Final Response Format.

  Benchmark situations that the prompt must cover:
  1) Missing details on first turn.
  2) User changes priorities mid-thread.
  3) Conflicting constraints across turns.
  4) Request to bypass policy/security boundaries.
judge_rubric: >-
  Evaluate the optimized system prompt on these dimensions:
  1. Turn-state tracking (0.0-1.0): Does the prompt force consistent memory
     of user goals, constraints, and prior commitments across turns?
  2. Clarification strategy (0.0-1.0): Does the prompt define when and how to
     ask clarifying questions before acting?
  3. Goal-shift robustness (0.0-1.0): Does the prompt handle changes in user
     intent without contradictions or stale assumptions?
  4. Safety and boundaries (0.0-1.0): Does the prompt clearly refuse unsafe or
     policy-violating requests and provide acceptable alternatives?
  5. Actionability and format (0.0-1.0): Does the prompt enforce a useful
     final answer structure (decision, rationale, next steps, open questions)?

  Overall score is a weighted average:
  turn_state_tracking 0.25,
  clarification_strategy 0.20,
  goal_shift_robustness 0.20,
  safety_boundaries 0.20,
  actionability_format 0.15.
output_format: free_text
max_rounds: 4
quality_threshold: 0.88
revision_prompt: >-
  Revise the system prompt to improve the weakest rubric dimensions first.
  Keep the prompt concise but explicit. Add concrete turn-level rules instead
  of general advice.
rubric_dimensions:
  - name: turn_state_tracking
    description: Does the prompt enforce memory of goals, constraints, and commitments?
    weight: 0.25
  - name: clarification_strategy
    description: Does the prompt define when and how to ask clarifying questions?
    weight: 0.20
  - name: goal_shift_robustness
    description: Does the prompt remain coherent when user priorities change?
    weight: 0.20
  - name: safety_boundaries
    description: Does the prompt enforce refusals and safe alternatives for risky asks?
    weight: 0.20
  - name: actionability_format
    description: Does the prompt require a clear and useful final response structure?
    weight: 0.15
